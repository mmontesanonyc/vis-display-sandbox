<!DOCTYPE html>
<html lang="en">

<head>
    <title>Sandbox</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <script src="https://kit.fontawesome.com/da9b183546.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css" integrity="sha256-sA+zWATbFveLLNqWO2gtiw3HL/lh1giY/Inf1BJ0z14=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js" integrity="sha256-o9N1jGDZrf5tS+Ft4gbIK7mYMipq9lqpVJ91xHSyKhg=" crossorigin=""></script>
    <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
</head>

<style>
#map {
    height: 400px;
}

.info { 
    padding: 6px 8px;
    font: 14px/16px Arial, Helvetica, sans-serif; 
    background: white; 
    background: rgba(255,255,255,0.8); 
    box-shadow: 0 0 15px rgba(0,0,0,0.2); 
    border-radius: 5px; 
} 

.info h4 { 
    margin: 0 0 5px; 
    color: #777; 
}
</style>

<body class="bg-base-100">
    <div class="min-h-screen flex flex-col">
        <header class="bg-base-200 shadow">
            <div class="max-w-2xl mx-auto px-4 py-6">
                <h1 class="text-3xl font-bold">Sandbox</h1>
            </div>
        </header>

        <main class="flex-1">
            <div class="max-w-2xl mx-auto px-4 py-8">
                <div class="grid grid-cols-3 gap-2 mt-2">
                    <div class="col-span-2">
                        <p class="text-sm text-base-content/60 mb-2">Neighborhood:</p>
                        <div class="relative w-full border rounded-md">
                            <input 
                                type="text"
                                id="neighborhoodInput" 
                                placeholder="Enter a ZIP Code or neighborhood name"
                                class="w-full px-3 py-3 text-base border border-base-100 rounded-md"
                            />
                            <ul 
                                id="suggestions" 
                                class="absolute top-full left-0 right-0 bg-base-200 border border-base-300 border-t-0 rounded-b-md list-none m-0 p-0 max-h-64 overflow-y-auto hidden z-10"
                            ></ul>
                        </div>
                    </div>

                    <div class="w-full">
                        <p class="text-sm text-base-content/60 mb-2">Virus:</p>
                        <select id="virus" name="virus" class="w-full px-3 py-4 text-base border border-base-400 rounded-md">
                            <option value="COVID-19" selected>COVID-19</option>
                            <option value="Influenza">Influenza</option>
                            <option value="RSV">RSV</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 mt-2 z-0">
                    <div class="col-span-2 border rounded-md z-0" id="map"></div>
                    <div class="col-span-1 z-0">
                        <div id="barChart" class="w-full h-full"></div>
                    </div>
                </div>

                <div id="selected" class="mt-2 p-2 bg-base-200 rounded-lg hidden">
                    <p class="mb-4">
                        <span class="font-bold" id="displayRate">XX</span> 
                        <span class="printVirus font-bold">COVID-19</span> cases 
                        <span>per 100,000 people</span> in 
                        <span class="printNeighborhood font-bold">neighborhood</span> 
                        (a total of <span class="font-bold" id="displayCount">YY</span> cases).
                    </p>
                    <p class="mb-4">This is <span class="font-bold">higher</span> than the Citywide rate of <span class="font-bold">ZZ</span> per 100,000 people.</p>
                    <div class="grid grid-cols-2">
                        <p class="text-sm text-base-content/60 mb-2">Week ending: <span class="font-bold">MM/DD/YYYY</span></p>
                        <p class="text-sm text-base-content/60 mb-1">ZIP codes: <span id="selectedZips" class="font-bold"></span></p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-base-200 shadow mt-8">
            <div class="max-w-2xl mx-auto px-4 py-6">
                <p class="text-sm">Footer</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vega@5.30.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.21.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.26.0"></script>

    <script>
        var topoJSON;
        var uhf34Data;
        var csvData;
        var map;
        var geoJSONLayer;
        var selectedGeocode;
        var selectedVirus = "COVID-19";

        function initialize() {
            map = L.map('map').setView([40.715554, -74.0026642], 10);
            
            L.tileLayer('https://api.maptiler.com/maps/basic-v2/{z}/{x}/{y}.png?key=dwIJ8hO2KsTMegUfEpYE', {
                attribution: '<a href="https://www.maptiler.com/copyright/" target="_blank">&copy; MapTiler</a> <a href="https://www.openstreetmap.org/copyright" target="_blank">&copy; OpenStreetMap contributors</a>',
            }).addTo(map);
            
            L.control.scale({ metric: false, position: 'bottomleft' }).addTo(map);

            Promise.all([
                fetch('uhf34_data.csv').then(r => r.text()),
                fetch('UHF34.topo.json').then(r => r.json())
            ]).then(([csvText, topoData]) => {
                // Parse CSV
                const rows = csvText.trim().split(/\r?\n/);
                csvData = rows.slice(1).map(row => {
                    const values = row.split(',').map(v => v.trim());
                    return {
                        geocode: values[0],
                        name: values[1],
                        count: parseInt(values[2], 10),
                        rate: parseFloat(values[3])
                    };
                });

                // Parse TopoJSON
                topoJSON = topoData;
                const geojson = topojson.feature(topoData, topoData.objects[Object.keys(topoData.objects)[0]]);

                geoJSONLayer = L.geoJSON(geojson, {
                    style: feature => ({
                        color: feature.properties.GEOCODE === selectedGeocode ? "#2563eb" : "#555",
                        weight: feature.properties.GEOCODE === selectedGeocode ? 3 : 1,
                        fillOpacity: 0.1
                    }),
                    onEachFeature: (feature, layer) => {
                        layer.on('click', () => selectNeighborhood(feature.properties.GEOCODE));
                    }
                }).addTo(map);

                uhf34Data = topoJSON.objects.collection.geometries.map(polygon => ({
                    geocode: polygon.properties.GEOCODE,
                    name: polygon.properties.GEONAME,
                    zips: polygon.properties.ZIPS || []
                }));

                setupUI();
            });
        }

        function selectNeighborhood(geocode) {
            selectedGeocode = geocode;
            const neighborhood = uhf34Data.find(n => n.geocode === geocode);
            if (!neighborhood) return;

            document.getElementById('neighborhoodInput').value = neighborhood.name;
            document.getElementById('suggestions').style.display = 'none';
            updateUI(neighborhood);
        }

        function updateUI(neighborhood) {
            if (!neighborhood) return;

            // Update map styling
            geoJSONLayer.setStyle(feature => ({
                color: feature.properties.GEOCODE === selectedGeocode ? "#2563eb" : "#555",
                weight: feature.properties.GEOCODE === selectedGeocode ? 3 : 1,
                fillOpacity: 0.1
            }));

            // Zoom to neighborhood
            zoomToGeocode(selectedGeocode);

            // Find matching data
            const matchingData = csvData.find(d => d.geocode === String(selectedGeocode) && d.name === selectedVirus);

            // Update selected info panel
            document.getElementById('selectedZips').textContent = neighborhood.zips.join(', ');
            document.querySelectorAll('.printNeighborhood').forEach(el => {
                el.innerHTML = neighborhood.name;
            });
            document.querySelectorAll('.printVirus').forEach(el => {
                el.innerHTML = selectedVirus;
            });
            document.getElementById('displayRate').innerHTML = matchingData ? matchingData.rate : 'N/A';
            document.getElementById('displayCount').innerHTML = matchingData ? matchingData.count : 'N/A';
            document.getElementById('selected').style.display = 'block';

            // Update chart
            drawChart(csvData, selectedVirus, String(selectedGeocode));
        }

        function zoomToGeocode(geocode) {
            const geojson = topojson.feature(topoJSON, topoJSON.objects.collection);
            const selectedFeature = geojson.features.find(f => f.properties.GEOCODE === geocode);
            
            if (selectedFeature) {
                const bounds = L.geoJSON(selectedFeature).getBounds();
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }

        function setupUI() {
            const input = document.getElementById('neighborhoodInput');
            const suggestionsUl = document.getElementById('suggestions');

            input.addEventListener('input', (e) => {
                const value = e.target.value.toLowerCase().trim();
                suggestionsUl.innerHTML = '';

                if (value.length === 0) {
                    suggestionsUl.style.display = 'none';
                    return;
                }

                const filtered = uhf34Data.filter(item => 
                    item.name.toLowerCase().includes(value) || 
                    item.zips.some(zip => zip.startsWith(value))
                );

                if (filtered.length === 0) {
                    suggestionsUl.style.display = 'none';
                    return;
                }

                filtered.forEach(item => {
                    const li = document.createElement('li');
                    li.style.padding = '0.75rem 1rem';
                    li.style.cursor = 'pointer';
                    li.style.borderBottom = '1px solid lightgray';
                    li.style.fontSize = '16px';
                    li.innerHTML = `<strong>${item.name}</strong> <span style="font-size: 13px;">${item.zips.join(', ')}</span>`;

                    li.addEventListener('click', () => {
                        selectNeighborhood(item.geocode);
                    });

                    li.addEventListener('mouseover', () => {
                        li.style.backgroundColor = 'var(--color-background-tertiary)';
                    });

                    li.addEventListener('mouseout', () => {
                        li.style.backgroundColor = 'transparent';
                    });

                    suggestionsUl.appendChild(li);
                });

                suggestionsUl.style.display = 'block';
            });

            document.addEventListener('click', (e) => {
                if (e.target !== input) {
                    suggestionsUl.style.display = 'none';
                }
            });

            input.addEventListener('focus', () => {
                if (input.value.length > 0) {
                    suggestionsUl.style.display = 'block';
                }
            });

            document.getElementById('virus').addEventListener('change', (e) => {
                selectedVirus = e.target.value;
                document.querySelectorAll('.printVirus').forEach(el => {
                    el.innerHTML = selectedVirus;
                });
                
                if (selectedGeocode) {
                    const neighborhood = uhf34Data.find(n => n.geocode === selectedGeocode);
                    updateUI(neighborhood);
                } else {
                    drawChart(csvData, selectedVirus, null); // Draw chart without geocode highlight
                }
            });

            // Draw initial chart on load
            drawChart(csvData, selectedVirus, null);
        }

        function drawChart(data, virus, geocode) {
            const spec = {
                "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
                "width": "container",
                "height": "container",
                "data": { "values": data },
                "transform": [
                    {"filter": `datum.name === '${virus}'`}
                ],
                "mark": "bar",
                "encoding": {
                    "x": {"field": "rate", "type": "quantitative", "title": "Rate per 100,000"},
                    "y": {"field": "geocode", "type": "nominal", "axis": null, "sort": "-x"},
                    "color": geocode ? {
                        "condition": {"test": `datum.geocode === '${geocode}'`, "value": "#2563eb"},
                        "value": "#9ca3af"
                    } : {
                        "value": "#9ca3af"
                    }
                }
            };

            vegaEmbed('#barChart', spec, { actions: false });
        }

        initialize();
    </script>
</html>
